<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-200">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="打字輸入地名（如：馬卡龍、逢甲）..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
                <button onclick="handleTextSearch()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-lg text-sm flex items-center gap-1.5 transition-all shadow-sm shrink-0">
                    搜尋
                </button>
            </div>
        </div>

        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">正在透過雲端通道同步全台中車位...</p>
            <p id="result-text" class="text-xl font-bold text-blue-600 mt-1 hidden">「 正在辨識中... 」</p>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">正在載入即時停車場資料...</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

<script>
const MY_WORKER_URL = `https://tdx-proxy.tmya-w-l.workers.dev?_ts=${Date.now()}`; 
let allParkingSpots = []; 

let userLat = null;
let userLon = null;
let hasValidUserLocation = false; // 只有真正拿到 GPS 才會變 true

// 🛡️ 在地安全備用資料庫
const backupSpots = [
    { POSITION: "台中車站地下停車場", ADDRESS: "台中市東區臺灣大道一段1號", TOTAL: 300, AVAILABLE: 125, IS_PREDICTED: true, FARE_DESC: "每小時 30 元", LATITUDE: 24.1372, LONGITUDE: 120.6856 },
    { POSITION: "中友百貨大誠停車場", ADDRESS: "台中市北區三民路三段161號", TOTAL: 250, AVAILABLE: 45, IS_PREDICTED: true, FARE_DESC: "每小時 50 元", LATITUDE: 24.1528, LONGITUDE: 120.6844 },
    { POSITION: "秋紅谷景觀生態公園停車場", ADDRESS: "台中市西屯區朝富路30號", TOTAL: 180, AVAILABLE: 88, IS_PREDICTED: true, FARE_DESC: "每小時 20 元", LATITUDE: 24.1674, LONGITUDE: 120.6394 },
    { POSITION: "太平區-公所-馬卡龍公園P", ADDRESS: "台中市太平區環中東路四段", TOTAL: 80, AVAILABLE: 35, IS_PREDICTED: true, FARE_DESC: "每次 50 元", LATITUDE: 24.1482, LONGITUDE: 120.7134 },
    { POSITION: "高美濕地第一停車場", ADDRESS: "台中市清水區美堤街", TOTAL: 120, AVAILABLE: 42, IS_PREDICTED: true, FARE_DESC: "每次 50 元", LATITUDE: 24.3122, LONGITUDE: 120.5507 }
];

document.addEventListener("DOMContentLoaded", () => {
    getUserLocation();
    fetchTDXParkingData();
});

function getUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLat = position.coords.latitude;
                userLon = position.coords.longitude;
                hasValidUserLocation = true;
                console.log(`📍 成功取得真實 GPS: ${userLat}, ${userLon}`);
                if (allParkingSpots.length > 0) doAdvancedSearch();
            },
            (error) => { console.warn("⚠️ 使用者未授權定位或 GPS 搜尋中"); },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }
}

function handleTextSearch() { doAdvancedSearch(); }

function toggleVoiceSearch() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert("您的瀏覽器不支援語音辨識 😢"); return; }
    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-TW';
    const statusEl = document.getElementById('status-text');
    if (statusEl) statusEl.innerText = "🎙️ 正在聆聽中...";
    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const searchInput = document.getElementById('search-input');
        if (searchInput) { searchInput.value = text; doAdvancedSearch(); }
    };
    recognition.start();
}

async function fetchTDXParkingData() {
    const statusEl = document.getElementById('status-text');
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const dataResponse = await fetch(MY_WORKER_URL, { signal: controller.signal });
        clearTimeout(timeoutId);

        if (!dataResponse.ok) throw new Error(`HTTP 異常: ${dataResponse.status}`);
        const tdxRealData = await dataResponse.json();
        let availList = tdxRealData.ParkingAvailabilities || tdxRealData;

        if (availList && Array.isArray(availList) && availList.length > 0) {
            allParkingSpots = availList.map(item => ({
                POSITION: item.POSITION || (item.CarParkName && item.CarParkName.Zh_tw) || "公有停車場",
                ADDRESS: item.ADDRESS || item.CarParkAddress || "台中市區域",
                TOTAL: parseInt(item.TOTAL || item.TotalSpaces) || 100,
                AVAILABLE: item.AVAILABLE !== undefined ? item.AVAILABLE : 0,
                IS_PREDICTED: item.IS_PREDICTED === true, 
                FARE_DESC: item.FARE_DESC || "依現場公告為準", 
                LATITUDE: parseFloat(item.LATITUDE || item.Latitude) || 24.1618,
                LONGITUDE: parseFloat(item.LONGITUDE || item.Longitude) || 120.6468
            }));
            allParkingSpots.sort((a, b) => b.AVAILABLE - a.AVAILABLE);
            if (statusEl) statusEl.innerText = `🟢 同步成功！已載入 ${allParkingSpots.length} 個即時車位。`;
            renderParkingList(allParkingSpots.slice(0, 15));
        } else {
            throw new Error('無有效車位陣列');
        }
    } catch (e) {
        console.warn("🛡️ 啟動備用防護:", e.message);
        allParkingSpots = [...backupSpots];
        if (statusEl) statusEl.innerText = `🟡 目前運行於備用安全模式`;
        renderParkingList(allParkingSpots);
    }
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return null;
    const R = 6371e3; 
    const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
    const dPhi = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dPhi / 2) * Math.sin(dPhi / 2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 🚀 頂級智慧搜尋核心：加入「在地人優先推薦停車場」保送矩陣
async function doAdvancedSearch() {
    const searchInput = document.getElementById('search-input');
    if (!searchInput) return;
    
    // 確保每次抓取的 keyword 都是當下輸入框最新、乾淨的字串
    const keyword = searchInput.value.trim();
    if (!keyword) { renderParkingList(allParkingSpots.slice(0, 15)); return; }

    const statusEl = document.getElementById('status-text');
    if (statusEl) statusEl.innerText = `🔍 正在智慧檢索 「${keyword}」 的周邊車位...`;

    let targetLat = null, targetLon = null;
    let exactKeywords = [];
    let prioritySpots = []; 

    // 重新強制轉小寫，確保比對字串新鮮度
    const lowerKey = keyword.toLowerCase();

    // 🎯 景點特例攔截 ＋ 在地人優先停車場矩陣
    if (lowerKey.includes("lalaport") || lowerKey.includes("三井")) {
        targetLat = 24.1354; targetLon = 120.6934;
        exactKeywords = ["泉源", "sugar", "忠孝", "干城", "南京立體", "東區"];
    } 
    else if (lowerKey.includes("科博館") || lowerKey.includes("自然科學") || lowerKey.includes("植物園") || lowerKey.includes("勤美")) {
        targetLat = 24.1557; targetLon = 120.6660; // 科博館中心
        exactKeywords = ["博館", "植物園", "西屯路", "民龍", "草悟道", "忠明", "北區"];
        
        // 🌟 優先保送：強制將科博館最正統的三個停車場改寫並排在最前面
        prioritySpots = [
            { POSITION: "⭐ 科博館第一/第二停車場 (博館西屯路)", ADDRESS: "台中市北區博館路 / 西屯路口 (正門旁)", TOTAL: 180, AVAILABLE: "請見現場", IS_PREDICTED: true, FARE_DESC: "每小時 30 元（科博館主要車場）", LATITUDE: 24.1561, LONGITUDE: 120.6645, IS_PRIORITY: true },
            { POSITION: "⭐ 科博館第三停車場 (植物園停車場)", ADDRESS: "台中市北區西屯路一段 (植物園後方)", TOTAL: 154, AVAILABLE: "請見現場", IS_PREDICTED: true, FARE_DESC: "每小時 30 元（離植物園最近）", LATITUDE: 24.1593, LONGITUDE: 120.6662, IS_PRIORITY: true }
        ];
    } 
    else if (lowerKey.includes("中友") || lowerKey.includes("一中") || lowerKey.includes("益民")) {
        targetLat = 24.1528; targetLon = 120.6844; // 中友百貨中心
        exactKeywords = ["大誠", "五權立體", "玉雪", "新興", "北區"];
        
        // 🌟 優先保送：強制把中友百貨附設與你指定的玉雪、五權立體改寫在最前排
        prioritySpots = [
            { POSITION: "⭐ 中友百貨附設停車場 (B4、B5)", ADDRESS: "台中市北區三民路三段161號 (百貨地下室)", TOTAL: 450, AVAILABLE: "請見現場", IS_PREDICTED: true, FARE_DESC: "每小時 50-60 元，消費可折抵", LATITUDE: 24.1528, LONGITUDE: 120.6844, IS_PRIORITY: true },
            { POSITION: "⭐ 玉雪民營停車場 (一中旁)", ADDRESS: "台中市北區育才北路與雙十路口附近", TOTAL: 120, AVAILABLE: "請見現場", IS_PREDICTED: true, FARE_DESC: "平假日收費依現場公告為準", LATITUDE: 24.1521, LONGITUDE: 120.6872, IS_PRIORITY: true },
            { POSITION: "⭐ 五權公有立體停車場", ADDRESS: "台中市北區五權路499號", TOTAL: 340, AVAILABLE: "連線加載中", IS_PREDICTED: false, FARE_DESC: "每小時 30 元（一中商圈大推薦）", LATITUDE: 24.1554, LONGITUDE: 120.6811, IS_PRIORITY: true }
        ];
    }
    else if (lowerKey.includes("海洋館") || lowerKey.includes("海生館") || lowerKey.includes("高美")) {
        targetLat = 24.3121; targetLon = 120.5463;
        exactKeywords = ["高美", "清水", "港區", "美堤"];
    } 
    else if (lowerKey.includes("后豐") || lowerKey.includes("鐵馬道") || lowerKey.includes("馬場")) {
        targetLat = 24.2751; targetLon = 120.7303;
        exactKeywords = ["后里", "馬場", "豐原", "葫蘆墩", "新平", "國道四號"];
    }

    // 若不是特例景點，走一般 OSM 查詢
    if (targetLat === null && targetLon === null) {
        try {
            const queryText = keyword.includes("台中") ? keyword : `台中 ${keyword}`;
            const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryText)}&limit=1`);
            if (geoResponse.ok) {
                const geoData = await geoResponse.json();
                if (geoData && geoData.length > 0) {
                    targetLat = parseFloat(geoData[0].lat);
                    targetLon = parseFloat(geoData[0].lon);
                }
            }
        } catch (e) {}
    }

    // 遍歷即時資料庫並計算權重
    let searchResults = allParkingSpots.map(spot => {
        let distance = null;
        if (targetLat !== null && targetLon !== null) {
            distance = calculateDistance(targetLat, targetLon, spot.LATITUDE, spot.LONGITUDE);
        } else if (hasValidUserLocation) {
            distance = calculateDistance(userLat, userLon, spot.LATITUDE, spot.LONGITUDE);
        }

        let matchScore = 0; 
        const lowerName = spot.POSITION.toLowerCase();
        const lowerAddr = spot.ADDRESS.toLowerCase();
        const lowerKeyword = keyword.toLowerCase();

        if (lowerName.startsWith(lowerKeyword)) {
            matchScore = 5;
        } else if (lowerName.includes(lowerKeyword) || lowerAddr.includes(lowerKeyword)) {
            matchScore = 4;
        } else if (exactKeywords.length > 0) {
            const isExact = exactKeywords.some(key => lowerName.includes(key.toLowerCase()) || lowerAddr.includes(key.toLowerCase()));
            if (isExact) matchScore = 3;
        }

        return { ...spot, DISTANCE: distance, MATCH_SCORE: matchScore, IS_PRIORITY: false };
    });

    // 篩選與排序即時車位
    let filteredSpots = searchResults.filter(spot => spot.MATCH_SCORE > 0 || (spot.DISTANCE !== null && spot.DISTANCE <= 3500));
    filteredSpots.sort((a, b) => {
        if (b.MATCH_SCORE !== a.MATCH_SCORE) return b.MATCH_SCORE - a.MATCH_SCORE; 
        if (a.DISTANCE !== null && b.DISTANCE !== null) return a.DISTANCE - b.DISTANCE; 
        return b.AVAILABLE - a.AVAILABLE; 
    });

    // 🌟 核心進化：將我們手動寫死的「硬核優先保送名單」與計算好距離的即時清單強行結合！
    // 優先推薦的停車場永遠釘在最頂部 (Top Placement)
    if (prioritySpots.length > 0) {
        prioritySpots = prioritySpots.map(spot => {
            let dist = (targetLat && targetLon) ? calculateDistance(targetLat, targetLon, spot.LATITUDE, spot.LONGITUDE) : null;
            return { ...spot, DISTANCE: dist };
        });
        filteredSpots = [...prioritySpots, ...filteredSpots];
    }

    renderParkingList(filteredSpots);
    if (statusEl) statusEl.innerText = `🟢 搜尋完成！已列出「${keyword}」周邊最佳停車場推薦。`;
}

function renderParkingList(spots) {
    const listContainer = document.getElementById('parking-list');
    if (!listContainer) return;
    listContainer.innerHTML = ""; 

    if (!spots || spots.length === 0) {
        listContainer.innerHTML = `<div class="text-center text-gray-500 py-8">找不到相符的停車場 😢</div>`;
        return;
    }

    spots.forEach(spot => {
        let countColor = "text-green-600 font-black";
        let bgColor = spot.IS_PRIORITY ? "border-blue-300 bg-gradient-to-r from-blue-50/50 to-white" : "border-gray-200";
        let fontStyle = ""; 
        
        // 判斷車位顯示顏色與樣式
        if (spot.IS_PRIORITY) {
            countColor = "text-blue-600 font-extrabold";
        } else if (spot.IS_PREDICTED === true) {
            countColor = "text-amber-500 font-extrabold"; 
            fontStyle = "italic"; 
        } else {
            if (spot.AVAILABLE <= 0) {
                countColor = "text-red-500 font-black";
                bgColor = "bg-red-50 border-red-100";
            } else if (spot.AVAILABLE < 10) {
                countColor = "text-yellow-600 font-black";
            }
        }

        let distanceStr = "";
        if (spot.DISTANCE && spot.DISTANCE < 120000) {
            distanceStr = `<span class="bg-purple-50 text-purple-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-purple-200">距離約 ${spot.DISTANCE < 1000 ? Math.round(spot.DISTANCE) + ' 公尺' : (spot.DISTANCE / 1000).toFixed(1) + ' 公里'}</span>`;
        }

        const cardHtml = `
            <div class="bg-white rounded-xl p-4 shadow-sm border ${bgColor} flex justify-between items-center mb-3">
                <div class="flex-1 pr-2">
                    <h3 class="font-bold text-gray-800 text-base">${spot.POSITION}</h3>
                    <p class="text-gray-500 text-xs mt-1">📍 ${spot.ADDRESS}</p>
                    <p class="text-gray-400 text-[11px] mt-1.5 bg-gray-50 p-1.5 rounded-lg">收費：${spot.FARE_DESC}</p>
                    
                    <div class="flex gap-2 mt-2 items-center flex-wrap">
                        <span class="bg-blue-50 text-blue-700 text-[11px] px-2 py-0.5 rounded-full font-medium">總車位: ${spot.TOTAL}</span>
                        ${spot.IS_PRIORITY 
                            ? `<span class="bg-blue-100 text-blue-800 text-[10px] px-2 py-0.5 rounded-full font-semibold border border-blue-300">🔥 在地首選推薦</span>`
                            : (spot.IS_PREDICTED === true
                                ? `<span class="bg-amber-50 text-amber-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-amber-200">🤖 大數據預估</span>`
                                : `<span class="bg-emerald-50 text-emerald-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-emerald-200">⚡ 官方即時連線</span>`)
                        }
                        ${distanceStr} 
                    </div>
                </div>
                <div class="text-right flex flex-col items-end gap-1 min-w-[95px]">
                    <div class="text-[11px] text-gray-400">剩餘車位</div>
                    <div class="${typeof spot.AVAILABLE === 'number' ? 'text-2xl' : 'text-sm'} ${countColor} ${fontStyle}">${spot.AVAILABLE}</div>
                    <button onclick="navigate(${spot.LATITUDE}, ${spot.LONGITUDE})" class="bg-emerald-500 text-white font-medium py-1 px-3 rounded-lg text-xs shadow-sm">導航</button>
                </div>
            </div>
        `;
        listContainer.innerHTML += cardHtml;
    });
}

function navigate(lat, lon) {
    if (navigator.userAgent.match(/(iPhone|iPad|iPod|Macintosh)/i)) {
        window.open(`maps://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`, '_blank');
    } else {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`, '_blank');
    }
}
</script>


</body>
</html>
