// 📐 海氏距離公式
function calculateDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return null;
    const R = 6371e3; 
    const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
    const dPhi = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dPhi / 2) * Math.sin(dPhi / 2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

async function doAdvancedSearch() {
    const searchInput = document.getElementById('search-input');
    const statusEl = document.getElementById('status-text');
    
    let keyword = searchInput.value ? searchInput.value.trim() : "";
    if (!keyword) {
        alert("請輸入搜尋地點！");
        return; // 這裡在 function 內，是合法的
    }

    // 🎯 簡稱正名結界
    if (keyword.includes("綠美圖")) {
        keyword = "臺中綠美圖"; 
    } else if (keyword.includes("科博館")) {
        keyword = "國立自然科學博物館";
    } else if (keyword.includes("中友")) {
        keyword = "中友百貨";
    } else if (keyword.includes("馬卡龍")) {
        keyword = "馬卡龍公園";
    } else if (keyword.includes("LaLaport") || keyword.includes("lalaport") || keyword.includes("三井")) {
        keyword = "LaLaport 台中";
    } else if (keyword.includes("武陵")) {
        keyword = "武陵農場";
    }

    if (searchInput) searchInput.value = keyword; 
    if (statusEl) statusEl.innerText = `🔍 正在精確定位「${keyword}」的經緯度座標...`;

    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(keyword)}&accept-language=zh-TW&limit=1`);
        const data = await res.json();

        if (data && data.length > 0) {
            const targetLat = parseFloat(data[0].lat);
            const targetLon = parseFloat(data[0].lon);
            const displayName = data[0].display_name.split(',')[0]; 

            if (statusEl) statusEl.innerText = `🎯 已成功定位到「${displayName}」，正在抓取周邊車位...`;

            // 呼叫下方雷達函數，傳入精確座標與預設 5000 公尺 (5公里)
            await fetchLiveTrafficAPI(targetLat, targetLon, displayName, 5000);
        } else {
            if (statusEl) statusEl.innerText = `❌ 地圖找不到「${keyword}」的位置，請嘗試換個字搜尋。`;
        }
    } catch (error) {
        console.error("搜尋定位失敗:", error);
        if (statusEl) statusEl.innerText = "❌ 定位引擎暫時失去連線，請稍後再試。";
    }
}

                                    <p style="margin: 5px 0;">📏 距離目標：<span style="color:#2563eb; font-weight:bold;">${distance < 1000 ? Math.round(distance) + ' 公尺' : (distance / 1000).toFixed(1) + ' 公里'}</span></p>
                                    
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top: 10px; border-top: 1px dashed #eee;">
                                        <div style="font-size: 0.9em; color:#1f2937;">總車位: ${total} | <strong>剩餘: <span style="color:${available > 0 ? '#10b981' : '#ef4444'}; font-size:1.2em;">${available}</span></strong></div>
                                        <div style="display:flex; gap: 6px;">
                                            ${parkingId ? `<button onclick="window.open('https://e-traffic.taichung.gov.tw/ATIS_TCC/Device/FramePage?type=parking&id=${parkingId}')" style="background:#f3f4f6; color:#374151; border:1px solid #d1d5db; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:0.85em; font-weight:bold;">💰 收費詳情</button>` : ''}
                                            <button onclick="window.open('${googleNavigationUrl}')" style="background:${badgeColor}; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.85em;">導航</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });

                if (statusEl) {
                    if (showCount > 0) {
                        statusEl.innerText = `🟢 成功！已搜出「${locationName}」周邊 5 公里內 ${showCount} 個即時車位！`;
                    } else {
                        statusEl.innerText = `❌ 「${locationName}」方圓 5 公里內查無立體停車場。`;
                    }
                }
            } else {
                if (statusEl) statusEl.innerText = `❌ 「${locationName}」方圓 5 公里內查無立體停車場。`;
            }
        }
    } catch (error) {
        console.error("雷達撈取失敗:", error);
        if (statusEl) statusEl.innerText = "❌ 無法取得即時車位資料，請檢查雲端通道連線。";
    }
}

function renderParkingList(spots) {
    const listContainer = document.getElementById('parking-list');
    if (!listContainer) return;
    listContainer.innerHTML = ""; 

    if (!spots || spots.length === 0) {
        listContainer.innerHTML = `<div class="text-center text-gray-500 py-8">方圓 3 公里內沒有找到對接即時系統的停車場 😢</div>`;
        return;
    }

    spots.forEach(spot => {
        let countColor = "text-green-600 font-black";
        let bgColor = "border-gray-200";
        
        if (spot.AVAILABLE <= 0) {
            countColor = "text-red-500 font-black";
            bgColor = "bg-red-50 border-red-100";
        } else if (spot.AVAILABLE < 10) {
            countColor = "text-yellow-600 font-black";
        }

        let distanceStr = "";
        if (spot.DISTANCE) {
            distanceStr = `<span class="bg-purple-50 text-purple-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-purple-200">距離目標 ${spot.DISTANCE < 1000 ? Math.round(spot.DISTANCE) + ' 公尺' : (spot.DISTANCE / 1000).toFixed(1) + ' 公里'}</span>`;
        }

const cardHtml = `
            <div class="bg-white rounded-xl p-4 shadow-sm border ${bgColor} flex justify-between items-center mb-3">
                <div class="flex-1 pr-2">
                    <h3 class="font-bold text-gray-800 text-base"> ${spot.POSITION || spot.position || "未知停車場"} </h3>
                    <p class="text-gray-500 text-xs mt-1">📍 ${spot.ADDRESS || spot.address || "台中市區域"} </p>
                    <p class="text-gray-400 text-[11px] mt-1.5 bg-gray-50 p-1.5 rounded-lg">收費： ${spot.FARE_DESC || spot.fare_desc || "依現場公告為準"} </p>
                    <div class="flex gap-2 mt-2 items-center flex-wrap">
                        <span class="bg-blue-50 text-blue-700 text-[11px] px-2 py-0.5 rounded-full font-medium">總車位: ${spot.TOTAL || spot.total || 50} </span>
                        <span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-blue-200">ℹ️ 資料來源：台中市即時交通網 </span>
                        ${distanceStr}
                    </div>
                </div>
                <div class="text-right flex flex-col items-end gap-1 min-w-[95px]">
                    <div class="text-[11px] text-gray-400">剩餘車位</div>
                    <div class="text-2xl ${countColor}"> ${spot.AVAILABLE !== undefined ? spot.AVAILABLE : (spot.available_car !== undefined ? spot.available_car : 0)} </div>
                    <button onclick="navigate(${spot.LATITUDE || spot.latitude}, ${spot.LONGITUDE || spot.longitude})" class="bg-emerald-500 text-white font-medium py-1 px-3 rounded-lg text-xs shadow-sm">導航</button>
                </div>
            </div>
        `;
        listContainer.innerHTML += cardHtml;
    });
}

function navigate(lat, lon) {
    if (navigator.userAgent.match(/(iPhone|iPad|iPod|Macintosh)/i)) {
        window.open(`maps://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`, '_blank');
    } else {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`, '_blank');
    }
}
</script>


</body>
