<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-200">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="打字輸入地名（如：馬卡龍、逢甲）..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
                <button onclick="handleTextSearch()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-lg text-sm flex items-center gap-1.5 transition-all shadow-sm shrink-0">
                    搜尋
                </button>
            </div>
        </div>

        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">智慧停車系統已就緒！請按下方麥克風或在上方打字搜尋。</p>
            <p id="result-text" class="text-xl font-bold text-blue-600 mt-1 hidden">「 正在辨識中... 」</p>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">資料加載中...</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

    <script>
        let isRecording = false;
        let recognition = null;
        let allParkingSpots = []; 

        // 網頁載入完成後自動執行
        window.addEventListener('DOMContentLoaded', () => {
            initParkingData();
            
            // 綁定鍵盤 Enter 鍵，打字完按 Enter 也能直接搜尋
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleTextSearch();
                }
            });
        });

        // 資料庫：收錄全台中熱門區核心停車場（新增馬卡龍公園周邊）
        function initParkingData() {
            allParkingSpots = [
                // 💡 太平區（新增熱門馬卡龍公園點位）
                { POSITION: "馬卡龍公園立體停車場", ADDRESS: "太平區環中東路四段 (馬卡龍公園旁)", TOTAL: 150, AVAILABLE: 68, LATITUDE: 24.1365, LONGITUDE: 120.7145 },
                { POSITION: "馬卡龍公園迪卡儂側平面停車場", ADDRESS: "太平區環中東路四段與振興路口", TOTAL: 80, AVAILABLE: 24, LATITUDE: 24.1352, LONGITUDE: 120.7152 },
                { POSITION: "太平區新平立體停車場", ADDRESS: "太平區樹德路", TOTAL: 110, AVAILABLE: 47, LATITUDE: 24.1552, LONGITUDE: 120.7138 },
                { POSITION: "太平運動場平面停車場", ADDRESS: "太平區中興東路", TOTAL: 60, AVAILABLE: 22, LATITUDE: 24.1285, LONGITUDE: 120.7194 },
                { POSITION: "太平坪林森林公園停車場", ADDRESS: "太平區中山路二段", TOTAL: 130, AVAILABLE: 75, LATITUDE: 24.1435, LONGITUDE: 120.7312 },

                // 中區、西區
                { POSITION: "台中火車站地下停車場", ADDRESS: "中區台灣大道一段1號", TOTAL: 350, AVAILABLE: 142, LATITUDE: 24.1372, LONGITUDE: 120.6856 },
                { POSITION: "府後街地下停車場", ADDRESS: "西區府後街1-1號", TOTAL: 120, AVAILABLE: 35, LATITUDE: 24.1432, LONGITUDE: 120.6819 },
                { POSITION: "台中大創綠園道停車場", ADDRESS: "西區公益路68號", TOTAL: 200, AVAILABLE: 88, LATITUDE: 24.1512, LONGITUDE: 120.6638 },
                { POSITION: "大墩廣場停車場", ADDRESS: "西區大墩路", TOTAL: 90, AVAILABLE: 12, LATITUDE: 24.1531, LONGITUDE: 120.6492 },
                
                // 北區
                { POSITION: "一中街新友停車場", ADDRESS: "北區一中街", TOTAL: 80, AVAILABLE: 15, LATITUDE: 24.1495, LONGITUDE: 120.6852 },
                { POSITION: "中友百貨地下停車場", ADDRESS: "北區三民路三段161號", TOTAL: 400, AVAILABLE: 104, LATITUDE: 24.1528, LONGITUDE: 120.6864 },
                { POSITION: "台中公園地下停車場", ADDRESS: "北區公園路37-1號", TOTAL: 300, AVAILABLE: 210, LATITUDE: 24.1441, LONGITUDE: 120.6848 },

                // 西屯區
                { POSITION: "逢甲黎客商旅旁停車場", ADDRESS: "西屯區逢甲路", TOTAL: 80, AVAILABLE: 18, LATITUDE: 24.1782, LONGITUDE: 120.6455 },
                { POSITION: "秋紅谷景觀生態公園停車場", ADDRESS: "西屯區朝馬路30號", TOTAL: 150, AVAILABLE: 64, LATITUDE: 24.1675, LONGITUDE: 120.6398 },
                { POSITION: "惠安立體停車場(歌劇院旁)", ADDRESS: "西屯區惠來路二段", TOTAL: 260, AVAILABLE: 45, LATITUDE: 24.1632, LONGITUDE: 120.6415 },
                { POSITION: "逢甲福星立體停車場", ADDRESS: "西屯區福星路", TOTAL: 180, AVAILABLE: 3, LATITUDE: 24.1764, LONGITUDE: 120.6462 },

                // 南屯區
                { POSITION: "大業初中地下停車場", ADDRESS: "南屯區大業路100號", TOTAL: 50, AVAILABLE: 8, LATITUDE: 24.1534, LONGITUDE: 120.6512 },
                { POSITION: "文心森林公園停車場", ADDRESS: "南屯區向上路二段", TOTAL: 220, AVAILABLE: 115, LATITUDE: 24.1438, LONGITUDE: 120.6441 },
                { POSITION: "南屯國民運動中心停車場", ADDRESS: "南屯區黎明路一段", TOTAL: 70, AVAILABLE: 33, LATITUDE: 24.1368, LONGITUDE: 120.6272 },

                // 大里區
                { POSITION: "大里區運動公園地下停車場", ADDRESS: "大里區國光路二段505號", TOTAL: 420, AVAILABLE: 180, LATITUDE: 24.1118, LONGITUDE: 120.6872 },
                { POSITION: "大里軟體園區停車場", ADDRESS: "大里區科技路1號", TOTAL: 250, AVAILABLE: 142, LATITUDE: 24.0952, LONGITUDE: 120.6958 },
                { POSITION: "大里國光路大潤發停車場", ADDRESS: "大里區國光路二段", TOTAL: 150, AVAILABLE: 60, LATITUDE: 24.1165, LONGITUDE: 120.6841 },

                // 北屯區
                { POSITION: "北屯總站停車場", ADDRESS: "北屯區敦富路", TOTAL: 200, AVAILABLE: 95, LATITUDE: 24.1834, LONGITUDE: 120.7061 },
                { POSITION: "民俗公園地下停車場", ADDRESS: "北屯區旅順路二段73號", TOTAL: 160, AVAILABLE: 51, LATITUDE: 24.1711, LONGITUDE: 120.6888 },
                { POSITION: "大坑經補庫停車場", ADDRESS: "北屯區東山路一段", TOTAL: 240, AVAILABLE: 130, LATITUDE: 24.1805, LONGITUDE: 120.7325 }
            ];

            document.getElementById('status-text').innerText = "🟢 全功能資料庫就緒！您可以用語音，也可以在上方框框打字搜尋。";
            renderParkingList(allParkingSpots.slice(0, 8));
        }

        // 🚀 新增功能：處理打字搜尋按鈕點擊
        function handleTextSearch() {
            const inputVal = document.getElementById('search-input').value;
            if (!inputVal.trim()) {
                alert("請先輸入要搜尋的地名或行政區喔！");
                return;
            }
            document.getElementById('status-text').innerText = `已幫您打字搜尋「${inputVal}」附近的停車場：`;
            searchParkingSpots(inputVal);
        }

        // 將資料渲染至網頁
        function renderParkingList(spots) {
            const listContainer = document.getElementById('parking-list');
            listContainer.innerHTML = ""; 

            if (!spots || spots.length === 0) {
                listContainer.innerHTML = `<div class="text-center text-gray-500 py-8">找不到相符的停車場，換個名稱打字試試吧 😢</div>`;
                return;
            }

            spots.forEach(spot => {
                const name = spot.POSITION;
                const address = spot.ADDRESS;
                const totalSpaces = spot.TOTAL;
                const leftSpaces = spot.AVAILABLE; 
                const lat = spot.LATITUDE;
                const lng = spot.LONGITUDE;
                
                let countColor = "text-green-600";
                let bgColor = "border-gray-200";
                if (leftSpaces <= 0) {
                    countColor = "text-red-500";
                    bgColor = "bg-red-50 border-red-100";
                } else if (leftSpaces < 10) {
                    countColor = "text-yellow-600";
                }

                const cardHtml = `
                    <div class="bg-white rounded-xl p-4 shadow-sm border ${bgColor} flex justify-between items-center">
                        <div class="flex-1 pr-2">
                            <h3 class="font-bold text-gray-800 text-base">${name}</h3>
                            <p class="text-gray-500 text-xs mt-1"><i class="fa-solid fa-location-dot text-red-500"></i> ${address}</p>
                            <div class="flex gap-2 mt-2">
                                <span class="bg-blue-50 text-blue-700 text-[11px] px-2 py-0.5 rounded-full font-medium">總車位: ${totalSpaces}</span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1 min-w-[90px]">
                            <div class="text-[11px] text-gray-400">剩餘車位</div>
                            <div class="text-2xl font-black ${countColor}">${leftSpaces}</div>
                            <button onclick="navigate(${lat}, ${lng})" class="bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-1 px-3 rounded-lg text-xs flex items-center gap-1 transition-all shadow-sm">
                                <i class="fa-solid fa-location-arrow"></i> 導航
                            </button>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHtml;
            });
        }

        // 關鍵字比對過濾（不論打字還是語音，共用此段進行模糊比對）
        function searchParkingSpots(keyword) {
            if (!allParkingSpots || allParkingSpots.length === 0) return;
            const cleanKey = keyword.trim();
            const filtered = allParkingSpots.filter(spot => {
                const pName = spot.POSITION || "";
                const pAddr = spot.ADDRESS || "";
                return pName.includes(cleanKey) || pAddr.includes(cleanKey);
            });
            renderParkingList(filtered);
        }

        // 語音辨識核心
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("目前瀏覽器不支援語音辨識，請使用 Android Chrome 開啟！");
                return null;
            }

            const rec = new SpeechRecognition();
            rec.lang = 'zh-TW';
            rec.continuous = false;
            rec.interimResults = true;

            rec.onresult = (event) => {
                const resultText = document.getElementById('result-text');
                let transcript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }
                resultText.classList.remove('hidden');
                resultText.innerText = `「 ${transcript} 」`;
            };

            rec.onend = () => {
                const resultText = document.getElementById('result-text').innerText;
                const queryLocation = resultText.replace(/[「」\s]/g, '');
                if (queryLocation && queryLocation !== "請說出目的地..." && queryLocation !== "正在辨識中...") {
                    document.getElementById('status-text').innerText = `已幫您語音搜尋「${queryLocation}」附近的停車場：`;
                    searchParkingSpots(queryLocation); 
                }
                stopMicUI();
            };

            rec.onerror = () => { stopMicUI(); };
            return rec;
        }

        function toggleVoiceSearch() {
            if (!recognition) recognition = initSpeechRecognition();
            if (!recognition) return;
            if (!isRecording) { try { recognition.start(); startMicUI(); } catch (e) {} } 
            else { recognition.stop(); stopMicUI(); }
        }

        function startMicUI() {
            isRecording = true;
            document.getElementById('mic-btn').classList.replace('bg-blue-600', 'bg-red-500');
            document.getElementById('mic-btn').classList.add('recording-active');
            document.getElementById('mic-icon').classList.replace('fa-microphone', 'fa-stop');
            document.getElementById('mic-tip').innerText = "說完請再按一次，或靜止說話自動辨識";
            document.getElementById('status-text').innerText = "正在聆聽中...";
        }

        function stopMicUI() {
            isRecording = false;
            document.getElementById('mic-btn').classList.replace('bg-red-500', 'bg-blue-600');
            document.getElementById('mic-btn').classList.remove('recording-active');
            document.getElementById('mic-icon').classList.replace('fa-stop', 'fa-microphone');
            document.getElementById('mic-tip').innerText = "按我開始語音搜尋";
        }

        // 全相容 Google Maps 導航跳轉
        function navigate(lat, lng) {
            if (!lat || !lng) {
                alert("此停車場暫無定位資料");
                return;
            }
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            window.open(googleMapsUrl, '_blank');
        }
    </script>
</body>
</html>
