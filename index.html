<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
            background-color: #ef4444 !important; /* 錄音中變成紅色閃爍 */
        }
        /* 補上 Loading 旋轉動畫 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-200">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="打字輸入地名（如：逢甲夜市、一中街）..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
                <button onclick="doAdvancedSearch()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-all shadow-sm">
                    搜尋
                </button>
            </div>
        </div>
        
        <div style="margin: 10px 0; text-align: center; font-size: 0.95em; color: #4b5563;">
            <label style="cursor: pointer; display: inline-flex; align-items: center; gap: 6px; user-select: none;">
                <input type="checkbox" id="show-road-parking" style="width: 16px; height: 16px; cursor: pointer;">
                <span>🔍 包含顯示「路邊即時車格」（資料較多，載入較慢）</span>
            </label>
        </div>

        <!-- 💡 擴大至 3 公里的勾選區 -->
        <div style="margin: 10px 0; text-align: center; font-size: 0.95em; color: #4b5563;">
            <label style="cursor: pointer; display: inline-flex; align-items: center; gap: 6px; user-select: none;">
                <input type="checkbox" id="expand-radius-3km" style="width: 16px; height: 16px; cursor: pointer;">
                <span>🌐 找不到時？擴大雷達搜尋至 3 公里 (預設為 1.5 公里)</span>
            </label>
        </div>

        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">請輸入想去的台中景點（如：一中街、LaLaport）或按下方語音開始搜尋...</p>
            <!-- 💡 新增：用來顯示轉圈圈的容器 -->
            <div id="loading-spinner" class="hidden mt-3 text-center">
                <div class="spinner"></div>
            </div>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">請在上方輸入地點進行即時車位雷達搜尋 🔍</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

    <footer class="mt-8 mb-6 px-4 text-center text-gray-400 text-[11px] leading-relaxed max-w-md mx-auto border-t border-gray-100 pt-4">
        <p class="font-semibold mb-1">Copyright © 2026 tmyawl-design. All Rights Reserved.</p>
        <p class="mb-2">本專案為個人學術研究與前端開發作品集，嚴禁任何未經授權之商業轉售與營利行為。</p>
        <p class="text-gray-400/80">
            💡 <span class="font-medium">免責聲明：</span>本網頁僅供個人技術練習使用，不作任何商業盈利用途。
            資料來源為台中市即時交通網之公開傳輸內容，即時車位資訊及費率請以現場實際公告為準。
        </p>
    </footer>
    
<script>
async function searchParking() {
  const lat = document.getElementById("lat").value.trim();
  const lon = document.getElementById("lon").value.trim();
  const result = document.getElementById("result");

  result.innerHTML = "<div class='box'>查詢中...</div>";

  try {
    const apiUrl =
      `https://parkboss.tw/api/v1/query-parking-space-by-coordinate?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;

    const res = await fetch(apiUrl);
    const data = await res.json();

    if (!res.ok) {
      result.innerHTML = `
        <div class="box warning">
          查詢失敗：${res.status}
        </div>
      `;
      return;
    }

    const list = Array.isArray(data) ? data : (data.data || data.results || []);

    if (!Array.isArray(list) || list.length === 0) {
      result.innerHTML = "<div class='box warning'>查無附近停車場資料</div>";
      return;
    }

    result.innerHTML = list.map(item => {
      const name = item.name || "未命名停車場";
      const total = item.car_total ?? "無資料";
      const value = item.car_value ?? "無資料";
      const time = item.car_time || "無更新時間";
      const hours = item.op_hours || "未提供";
      const address = item.address || item.addr || "";
      const pay = item.pay_info || "未提供收費資訊";

      const mapUrl =
        item.lat && item.lon
          ? `https://www.google.com/maps?q=${item.lat},${item.lon}`
          : "#";

      return `
        <div class="card">
          <div class="name">${name}</div>
          <div>剩餘汽車位：<span class="available">${value}</span> / ${total}</div>
          <div class="small">更新時間：${time}</div>
          <div class="small">營業時間：${hours}</div>
          <div class="small">地址：${address}</div>
          <div class="small">收費：${pay}</div>
          <div class="small">
            <a href="${mapUrl}" target="_blank">開啟 Google 地圖導航</a>
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    result.innerHTML = `
      <div class="box warning">
        查詢失敗：${err.message}<br>
        可能原因：ParkBoss API 不允許前台跨網域 CORS 查詢。
      </div>
    `;
  }
}
</script>
</body>
</html>
