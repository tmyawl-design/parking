<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">正在連線台中交通網...</p>
            <p id="result-text" class="text-xl font-bold text-blue-600 mt-1 hidden">「 正在辨識中... 」</p>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">資料載入中，請稍候...</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

    <script>
        let isRecording = false;
        let recognition = null;
        let allParkingSpots = []; 

        // 網頁載入完成後自動執行
        window.addEventListener('DOMContentLoaded', () => {
            fetchTaichungParkingData();
        });

// 串接台中市政府 Open Data API（全新萬用代理打通版）
        async function fetchTaichungParkingData() {
            const statusText = document.getElementById('status-text');
            
            // 預設核心資料（保證一秒開畫面，絕不卡死）
            allParkingSpots = [
                { POSITION: "台中火車站地下停車場", ADDRESS: "中區台灣大道一段1號", TOTAL: 350, AVAILABLE: 125, LATITUDE: 24.1372, LONGITUDE: 120.6856 },
                { POSITION: "府後街地下停車場", ADDRESS: "西區府後街1-1號", TOTAL: 50, AVAILABLE: 42, LATITUDE: 24.1432, LONGITUDE: 120.6819 },
                { POSITION: "大業初中地下停車場", ADDRESS: "南屯區大業路100號", TOTAL: 30, AVAILABLE: 5, LATITUDE: 24.1534, LONGITUDE: 120.6512 },
                { POSITION: "逢甲黎客商旅旁停車場", ADDRESS: "西屯區逢甲路", TOTAL: 80, AVAILABLE: 18, LATITUDE: 24.1782, LONGITUDE: 120.6455 },
                { POSITION: "秋紅谷景觀生態公園停車場", ADDRESS: "西屯區朝馬路30號", TOTAL: 120, AVAILABLE: 64, LATITUDE: 24.1675, LONGITUDE: 120.6398 }
            ];
            renderParkingList(allParkingSpots);
            statusText.innerText = "正在實時同步台中交通網車位...";

            // 🚀 終極解決方案：使用可靠的萬用網頁代理處理 CORS 機制
            const proxyUrl = "https://thingproxy.freeboard.io/fetch/";
            const apiUrl = "https://datacenter.taichung.gov.tw/swagger/OpenData/72c08233-de17-43cf-87eb-f9e0b8e76c12"; 

            try {
                // 透過代理伺服器發送請求，繞過瀏覽器跨網域安全阻擋
                const response = await fetch(proxyUrl + apiUrl);
                if (!response.ok) throw new Error('代理伺服器回應異常');
                
                const realData = await response.json();

                if (Array.isArray(realData) && realData.length > 0) {
                    // 成功抓到政府大資料庫，直接將其指派給全域變數
                    allParkingSpots = realData;

                    statusText.innerText = `🟢 同步成功！已連線台中交通網，共載入 ${allParkingSpots.length} 個最新車位資料。`;
                    
                    // 刷新首頁前 8 筆真實數據
                    const resultText = document.getElementById('result-text').innerText;
                    if (resultText.includes("請說出目的地") || resultText === "") {
                        renderParkingList(allParkingSpots.slice(0, 8));
                    }
                }
            } catch (error) {
                console.log("即時同步略過，改採快取模式:", error);
                statusText.innerText = "🟡 無法即時連線，目前採用核心快取車位模式。";
            }
        }

        // 將資料渲染至網頁
        function renderParkingList(spots) {
            const listContainer = document.getElementById('parking-list');
            listContainer.innerHTML = ""; 

            if (!spots || spots.length === 0) {
                listContainer.innerHTML = `<div class="text-center text-gray-500 py-8">找不到相符的停車場 😢</div>`;
                return;
            }

            spots.forEach(spot => {
                const name = spot.POSITION || "公有停車場";
                const address = spot.ADDRESS || "台中市";
                const totalSpaces = parseInt(spot.TOTAL || 0);
                const leftSpaces = parseInt(spot.AVAILABLE || 0); 
                const lat = spot.LATITUDE;
                const lng = spot.LONGITUDE;
                
                let countColor = "text-green-600";
                let bgColor = "border-gray-200";
                if (leftSpaces <= 0) {
                    countColor = "text-red-500";
                    bgColor = "bg-red-50 border-red-100";
                } else if (leftSpaces < 5) {
                    countColor = "text-yellow-600";
                }

                const cardHtml = `
                    <div class="bg-white rounded-xl p-4 shadow-sm border ${bgColor} flex justify-between items-center">
                        <div class="flex-1 pr-2">
                            <h3 class="font-bold text-gray-800 text-base">${name}</h3>
                            <p class="text-gray-500 text-xs mt-1"><i class="fa-solid fa-location-dot text-red-500"></i> ${address}</p>
                            <div class="flex gap-2 mt-2">
                                <span class="bg-blue-50 text-blue-700 text-[11px] px-2 py-0.5 rounded-full font-medium">總車位: ${totalSpaces}</span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1 min-w-[90px]">
                            <div class="text-[11px] text-gray-400">剩餘車位</div>
                            <div class="text-2xl font-black ${countColor}">${leftSpaces}</div>
                            <button onclick="navigate(${lat}, ${lng})" class="bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-1 px-3 rounded-lg text-xs flex items-center gap-1 transition-all shadow-sm">
                                <i class="fa-solid fa-location-arrow"></i> 導航
                            </button>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHtml;
            });
        }

        // 語音搜尋過濾
        function searchParkingSpots(keyword) {
            if (!allParkingSpots || allParkingSpots.length === 0) return;

            const filtered = allParkingSpots.filter(spot => {
                const pName = spot.POSITION || "";
                const pAddr = spot.ADDRESS || "";
                return pName.includes(keyword) || pAddr.includes(keyword);
            });

            renderParkingList(filtered);
        }

        // 語音辨識核心
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("目前瀏覽器不支援語音辨識，請使用 Android Chrome 開啟！");
                return null;
            }

            const rec = new SpeechRecognition();
            rec.lang = 'zh-TW';
            rec.continuous = false;
            rec.interimResults = true;

            rec.onstart = () => { console.log("錄音中..."); };

            rec.onresult = (event) => {
                const resultText = document.getElementById('result-text');
                let transcript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }
                resultText.classList.remove('hidden');
                resultText.innerText = `「 ${transcript} 」`;
            };

            rec.onend = () => {
                const resultText = document.getElementById('result-text').innerText;
                const queryLocation = resultText.replace(/[「」\s]/g, '');
                if (queryLocation && queryLocation !== "請說出目的地..." && queryLocation !== "正在辨識中...") {
                    document.getElementById('status-text').innerText = `已幫您搜尋「${queryLocation}」附近的即時車位：`;
                    searchParkingSpots(queryLocation); 
                }
                stopMicUI();
            };

            rec.onerror = () => { stopMicUI(); };
            return rec;
        }

        function toggleVoiceSearch() {
            if (!recognition) recognition = initSpeechRecognition();
            if (!recognition) return;

            if (!isRecording) {
                try { recognition.start(); startMicUI(); } catch (e) {}
            } else {
                recognition.stop(); stopMicUI();
            }
        }

        function startMicUI() {
            isRecording = true;
            document.getElementById('mic-btn').classList.replace('bg-blue-600', 'bg-red-500');
            document.getElementById('mic-btn').classList.add('recording-active');
            document.getElementById('mic-icon').classList.replace('fa-microphone', 'fa-stop');
            document.getElementById('mic-tip').innerText = "說完請再按一次，或靜止說話自動辨識";
            document.getElementById('status-text').innerText = "正在聆聽中...";
        }

        function stopMicUI() {
            isRecording = false;
            document.getElementById('mic-btn').classList.replace('bg-red-500', 'bg-blue-600');
            document.getElementById('mic-btn').classList.remove('recording-active');
            document.getElementById('mic-icon').classList.replace('fa-stop', 'fa-microphone');
            document.getElementById('mic-tip').innerText = "按我開始語音搜尋";
        }

        // 全相容 Google Maps 喚醒網址
        function navigate(lat, lng) {
            if (!lat || !lng) {
                alert("此停車場暫無定位資料");
                return;
            }
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            window.open(googleMapsUrl, '_blank');
        }
    </script>
</body>
</html>
