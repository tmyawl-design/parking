<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-200">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="打字輸入地名（如：馬卡龍、逢甲）..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
                <button onclick="handleTextSearch()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-lg text-sm flex items-center gap-1.5 transition-all shadow-sm shrink-0">
                    搜尋
                </button>
            </div>
        </div>

        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">正在透過雲端通道同步全台中車位...</p>
            <p id="result-text" class="text-xl font-bold text-blue-600 mt-1 hidden">「 正在辨識中... 」</p>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">正在載入即時停車場資料...</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

    <script>
 // ==========================================
// 核心設定：請確認您的 Cloudflare Worker 網址
// ⚠️ 【重要設定】已加入自動破快取機制，強迫 Cloudflare 每次都吐出最新真車位！
// ==========================================
const MY_WORKER_URL = `https://tdx-proxy.tmya-w-l.workers.dev?_ts=${Date.now()}`; 

let allParkingSpots = []; // 儲存後端抓回來的所有車位資料
let backupSpots = [];     // 備用核心資料庫

// 網頁初始化載入
document.addEventListener("DOMContentLoaded", () => {
    // 1. 自動向 Worker 獲取最新即時資料
    fetchTDXParkingData();

    // 2. 自動強力綁定：讓輸入框支援按下 Enter 鍵也能觸發智慧搜尋
    const searchInput = document.getElementById('search-input');
    if (searchInput) {
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                doAdvancedSearch();
            }
        });
    }
    
    // 3. 自動強力綁定：點擊搜尋按鈕時觸發智慧搜尋
    const searchBtn = document.getElementById('search-btn');
    if (searchBtn) {
        searchBtn.removeAttribute('onclick'); // 移除舊的 onclick 避免衝突
        searchBtn.addEventListener('click', doAdvancedSearch);
    }
});

// 向您的 Cloudflare Worker 獲取最新即時資料（含預測資料與收費資訊）
async function fetchTDXParkingData() {
    try {
        if (MY_WORKER_URL.includes("您的帳號")) {
            throw new Error("尚未設定正確的 Worker 網址");
        }

        const dataResponse = await fetch(MY_WORKER_URL);
        if (!dataResponse.ok) throw new Error(`雲端通道回應異常 (狀態碼:${dataResponse.status})`);
        
        const tdxRealData = await dataResponse.json();

        if (tdxRealData && tdxRealData.error) {
            throw new Error(tdxRealData.error);
        }

        let availList = [];
        if (tdxRealData && tdxRealData.ParkingAvailabilities) {
            availList = tdxRealData.ParkingAvailabilities;
        } else if (Array.isArray(tdxRealData)) {
            availList = tdxRealData;
        }

        if (availList && Array.isArray(availList) && availList.length > 0) {
            allParkingSpots = availList.map(item => {
                const targetName = item.POSITION || (item.CarParkName && item.CarParkName.Zh_tw) || "公有停車場";
                return {
                    POSITION: targetName,
                    ADDRESS: item.ADDRESS || item.CarParkAddress || item.Address || "台中市區域",
                    TOTAL: parseInt(item.TOTAL || item.TotalSpaces) || 100,
                    AVAILABLE: item.AVAILABLE !== undefined ? item.AVAILABLE : (item.AvailableSpaces !== undefined ? item.AvailableSpaces : 0),
                    IS_PREDICTED: item.IS_PREDICTED === true, 
                    FARE_DESC: item.FARE_DESC || "依現場公告費率為準", 
                    LATITUDE: parseFloat(item.LATITUDE || item.Latitude) || 24.1372,
                    LONGITUDE: parseFloat(item.LONGITUDE || item.Longitude) || 120.6856
                };
            });

            allParkingSpots.sort((a, b) => b.AVAILABLE - a.AVAILABLE);
            document.getElementById('status-text').innerText = `🟢 同步成功！已透過雲端通道載入 ${allParkingSpots.length} 個即時車位。`;
            renderParkingList(allParkingSpots.slice(0, 15));
        } else {
            throw new Error('雲端回傳格式不符，未偵測到車位陣列');
        }
    } catch (e) {
        console.log("轉向安全備用模式:", e);
        allParkingSpots = [...backupSpots];
        document.getElementById('status-text').innerText = `🟡 目前運行於核心備用模式 (原因:${e.message})`;
        renderParkingList(allParkingSpots);
    }
}

// 計算經緯度公里距離公式 (Haversine 公式)
function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; 
    const phi1 = lat1 * Math.PI / 180;
    const phi2 = lat2 * Math.PI / 180;
    const deltaPhi = (lat2 - lat1) * Math.PI / 180;
    const deltaLambda = (lon2 - lon1) * Math.PI / 180;

    const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
              Math.cos(phi1) * Math.cos(phi2) *
              Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; 
}

// 智慧核心：地名轉座標 ＋ 半徑範圍雙軌搜尋
async function doAdvancedSearch() {
    const searchInput = document.getElementById('search-input');
    if (!searchInput) return;
    
    const keyword = searchInput.value.trim();
    
    if (!keyword) {
        renderParkingList(allParkingSpots.slice(0, 15));
        return;
    }

    document.getElementById('status-text').innerText = `🔍 正在計算 「${keyword}」 的周邊車位與距離...`;

    let targetLat = null;
    let targetLon = null;

    try {
        const queryText = keyword.includes("台中") ? keyword : `台中 ${keyword}`;
        const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryText)}&limit=1`;
        
        const geoResponse = await fetch(geoUrl, { 
            headers: { 
                'Accept-Language': 'zh-TW',
                'User-Agent': 'TaichungParkingApp/3.0' 
            } 
        });
        
        if (geoResponse.ok) {
            const geoData = await geoResponse.json();
            if (geoData && geoData.length > 0) {
                targetLat = parseFloat(geoData[0].lat);
                targetLon = parseFloat(geoData[0].lon);
            }
        }
    } catch (geoError) {
        console.log("地名解析暫時中斷，啟動純文字備援計算");
    }

    let searchResults = allParkingSpots.map(spot => {
        let distance = null;
        let matchText = 0;

        if (targetLat !== null && targetLon !== null) {
            distance = calculateDistance(targetLat, targetLon, spot.LATITUDE, spot.LONGITUDE);
        }

        if (spot.POSITION.toLowerCase().includes(keyword.toLowerCase()) || 
            spot.ADDRESS.toLowerCase().includes(keyword.toLowerCase())) {
            matchText = 1; 
        }

        return { ...spot, DISTANCE: distance, MATCH_TEXT: matchText };
    });

    let filteredSpots = searchResults.filter(spot => {
        return spot.MATCH_TEXT === 1 || (spot.DISTANCE !== null && spot.DISTANCE <= 3500);
    });

    filteredSpots.sort((a, b) => {
        if (a.DISTANCE !== null && b.DISTANCE !== null) {
            return a.DISTANCE - b.DISTANCE; 
        }
        return b.AVAILABLE - a.AVAILABLE;
    });

    renderParkingList(filteredSpots);
    document.getElementById('status-text').innerText = `🟢 搜尋完成！已列出「${keyword}」周邊最佳車位。`;
}

// 將資料渲染至網頁卡片面版
function renderParkingList(spots) {
    const listContainer = document.getElementById('parking-list');
    listContainer.innerHTML = ""; 

    if (!spots || spots.length === 0) {
        listContainer.innerHTML = `<div class="text-center text-gray-500 py-8">找不到相符的停車場，換個名稱試試吧 😢</div>`;
        return;
    }

    spots.forEach(spot => {
        let countColor = "text-green-600 font-black";
        let bgColor = "border-gray-200";
        let fontStyle = ""; 
        
        if (spot.IS_PREDICTED === true) {
            countColor = "text-amber-500 font-extrabold"; 
            fontStyle = "italic"; 
        } else {
            if (spot.AVAILABLE <= 0) {
                countColor = "text-red-500 font-black";
                bgColor = "bg-red-50 border-red-100";
            } else if (spot.AVAILABLE < 10) {
                countColor = "text-yellow-600 font-black";
            }
        }

        const cardHtml = `
            <div class="bg-white rounded-xl p-4 shadow-sm border ${bgColor} flex justify-between items-center mb-3">
                <div class="flex-1 pr-2">
                    <h3 class="font-bold text-gray-800 text-base">${spot.POSITION}</h3>
                    <p class="text-gray-500 text-xs mt-1"><i class="fa-solid fa-location-dot text-red-500"></i> ${spot.ADDRESS}</p>
                    
                    <p class="text-gray-400 text-[11px] mt-1.5 bg-gray-50 p-1.5 rounded-lg border border-gray-100">
                        <i class="fa-solid fa-circle-info text-blue-400"></i> 收費：${spot.FARE_DESC}
                    </p>

                    <div class="flex gap-2 mt-2 items-center flex-wrap">
                        <span class="bg-blue-50 text-blue-700 text-[11px] px-2 py-0.5 rounded-full font-medium">總車位: ${spot.TOTAL}</span>
                        
                        ${spot.IS_PREDICTED === true
                            ? `<span class="bg-amber-50 text-amber-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-amber-200">🤖 大數據預估</span>`
                            : `<span class="bg-emerald-50 text-emerald-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-emerald-200">⚡ 官方即時連線</span>`
                        }

                        ${(spot.DISTANCE !== null && spot.DISTANCE !== undefined) 
                            ? `<span class="bg-purple-50 text-purple-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-purple-200"><i class="fa-solid fa-route"></i> 距離約 ${spot.DISTANCE < 1000 ? Math.round(spot.DISTANCE) + ' 公尺' : (spot.DISTANCE / 1000).toFixed(1) + ' 公里'}</span>` 
                            : ''
                        } 
                    </div>
                </div>
                <div class="text-right flex flex-col items-end gap-1 min-w-[90px]">
                    <div class="text-[11px] text-gray-400">剩餘車位</div>
                    <div class="text-2xl ${countColor} ${fontStyle}">${spot.AVAILABLE}</div>
                    <button onclick="navigate(${spot.LATITUDE}, ${spot.LONGITUDE})" class="bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-1 px-3 rounded-lg text-xs flex items-center gap-1 transition-all shadow-sm">
                        <i class="fa-solid fa-location-arrow"></i> 導航
                    </button>
                </div>
            </div>
        `;
        listContainer.innerHTML += cardHtml;
    });
}

// 導航函數 (🌟 完美精準修復版)
function navigate(lat, lon) {
    if (navigator.userAgent.match(/(iPhone|iPad|iPod|Macintosh)/i)) {
        window.open(`maps://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`);
    } else {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
    }
}
    <script> 
</body>
