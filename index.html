<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
            background-color: #ef4444 !important; /* 錄音中變成紅色閃爍 */
        }
        /* 補上 Loading 旋轉動畫 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-200">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="打字輸入地名（如：逢甲夜市、一中街）..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
                <button onclick="doAdvancedSearch()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-all shadow-sm">
                    搜尋
                </button>
            </div>
        </div>
        
        <div style="margin: 10px 0; text-align: center; font-size: 0.95em; color: #4b5563;">
            <label style="cursor: pointer; display: inline-flex; align-items: center; gap: 6px; user-select: none;">
                <input type="checkbox" id="show-road-parking" style="width: 16px; height: 16px; cursor: pointer;">
                <span>🔍 包含顯示「路邊即時車格」（資料較多，載入較慢）</span>
            </label>
        </div>
<div style="margin: 10px 0; text-align: center; font-size: 0.95em; color: #4b5563;">
  <label style="cursor: pointer; display: inline-flex; align-items: center; gap: 6px; user-select: none;">
    <input type="checkbox" id="hide-full-parking" style="width: 16px; height: 16px; cursor: pointer;">
    <span>🚗 隱藏 0 車位／已滿停車場</span>
  </label>
</div>
        
<div style="margin: 10px 0; text-align: center; font-size: 0.95em; color: #4b5563;">
<span>📍 預設顯示 1.5 公里內停車場；若查無資料，可一鍵擴大至 3 公里</span>
</div>

        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">請輸入想去的台中景點（如：一中街、LaLaport）或按下方語音開始搜尋...</p>
            <!-- 💡 新增：用來顯示轉圈圈的容器 -->
            <div id="loading-spinner" class="hidden mt-3 text-center">
                <div class="spinner"></div>
            </div>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">請在上方輸入地點進行即時車位雷達搜尋 🔍</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

    <footer class="mt-8 mb-6 px-4 text-center text-gray-400 text-[11px] leading-relaxed max-w-md mx-auto border-t border-gray-100 pt-4">
        <p class="font-semibold mb-1">Copyright © 2026 tmyawl-design. All Rights Reserved.</p>
        <p class="mb-2">本專案為個人學術研究與前端開發作品集，嚴禁任何未經授權之商業轉售與營利行為。</p>
        <p class="text-gray-400/80">
            💡 <span class="font-medium">免責聲明：</span>本網頁僅供個人技術練習使用，不作任何商業盈利用途。
            資料來源為台中市即時交通網之公開傳輸內容，即時車位資訊及費率請以現場實際公告為準。
        </p>
    </footer>
    
<script>
let currentRadiusKm = 1.5;
let lastSearchKeyword = "";
let currentSearchMode = "offstreet"; 
// offstreet = 只查停車場
// onstreet = 只查路邊車格
// mixed = 停車場 + 路邊車格

const LANDMARKS = {
  "逢甲夜市": { lat: 24.1790, lon: 120.6466 },
  "一中街": { lat: 24.1492, lon: 120.6841 },
  "台中車站": { lat: 24.1368, lon: 120.6850 },
  "LaLaport": { lat: 24.1336, lon: 120.6917 },
  "台中公園": { lat: 24.1447, lon: 120.6839 },
  "勤美": { lat: 24.1516, lon: 120.6639 },
  "草悟道": { lat: 24.1510, lon: 120.6631 },
  "新光三越": { lat: 24.1646, lon: 120.6437 },
  "大遠百": { lat: 24.1641, lon: 120.6447 },
    "中友": { lat: 24.1520, lon: 120.6845 },
"中友百貨": { lat: 24.1520, lon: 120.6845 },
"中友百貨公司": { lat: 24.1520, lon: 120.6845 },
"一中商圈": { lat: 24.1492, lon: 120.6841 },
"一中": { lat: 24.1492, lon: 120.6841 },
};

async function doVoiceSearch(keyword) {
  console.log("doVoiceSearch 被執行，keyword =", keyword, "mode =", currentSearchMode);

  const statusText = document.getElementById("status-text");
  const parkingList = document.getElementById("parking-list");
  const spinner = document.getElementById("loading-spinner");

  currentRadiusKm = 1.5;
  lastSearchKeyword = keyword;
  currentSearchMode = "offstreet";

  if (!keyword) {
    statusText.textContent = "請先輸入地點，例如：逢甲夜市、一中街、LaLaport";
    return;
  }

  spinner.classList.remove("hidden");
  statusText.textContent = `正在搜尋「${keyword}」附近停車場...`;
  parkingList.innerHTML = `<div class="text-center text-gray-500 py-8">查詢中，請稍候...</div>`;

  try {
    const coord = await getCoordinate(keyword);

    if (!coord) {
      statusText.textContent = `找不到「${keyword}」的座標，請換一個較明確的地名。`;
      parkingList.innerHTML = `<div class="text-center text-red-500 py-8">找不到地點座標</div>`;
      return;
    }

    await searchParkingByCoordinate(coord.lat, coord.lon, keyword);

  } catch (err) {
    statusText.textContent = "查詢失敗";
    parkingList.innerHTML = `
      <div class="bg-white rounded-xl p-4 shadow-sm text-red-600">
        查詢失敗：${err.message}
      </div>
    `;
  } finally {
    spinner.classList.add("hidden");
  }
}

async function getCoordinate(keyword) {
  // 先用內建台中常用地點，速度最快
const cleanKeyword = keyword.trim();

// 先完全比對
if (LANDMARKS[cleanKeyword]) {
  return LANDMARKS[cleanKeyword];
}

// 再做常用關鍵字模糊比對
if (cleanKeyword.includes("中友")) {
  return { lat: 24.1520, lon: 120.6845 };
}

if (cleanKeyword.includes("一中")) {
  return { lat: 24.1492, lon: 120.6841 };
}

if (cleanKeyword.includes("逢甲")) {
  return { lat: 24.1790, lon: 120.6466 };
}

if (cleanKeyword.includes("綠美圖")) {
  return { lat: 24.1590, lon: 120.6590 };
}

if (cleanKeyword.includes("勤美") || cleanKeyword.includes("草悟道")) {
  return { lat: 24.1510, lon: 120.6631 };
}

  // 如果不是內建地點，就用 OpenStreetMap 查座標
  const url =
    `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(keyword + " 台中")}`;

  const res = await fetch(url, {
    headers: {
      "Accept": "application/json"
    }
  });

  const data = await res.json();

  if (!Array.isArray(data) || data.length === 0) {
    return null;
  }

  return {
    lat: data[0].lat,
    lon: data[0].lon
  };
}

async function searchParkingByCoordinate(lat, lon, keyword) {
  const statusText = document.getElementById("status-text");
  const parkingList = document.getElementById("parking-list");

const radiusKm = currentRadiusKm;
const includeOnStreet =
  currentSearchMode === "onstreet" ||
  currentSearchMode === "mixed" ||
  document.getElementById("show-road-parking")?.checked ||
  false;

const apiUrl =
  `https://tdx-proxy.tmya-w-l.workers.dev/parking?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&radiusKm=${radiusKm}&includeOnStreet=${includeOnStreet}`;

console.log("查詢地點：", keyword);
console.log("查詢座標：", lat, lon);
console.log("查詢半徑：", radiusKm);
console.log("查詢 API：", apiUrl);
    
    const res = await fetch(apiUrl);
  const data = await res.json();

  if (!res.ok) {
  console.log("後台錯誤內容：", data);
  throw new Error(
    data.error ||
    data.detail ||
    `查詢失敗，狀態碼：${res.status}`
  );
}

  const list = Array.isArray(data) ? data : (data.data || []);

const hideFullParking = document.getElementById("hide-full-parking")?.checked || false;

let modeFilteredList = list;

if (currentSearchMode === "offstreet") {
  modeFilteredList = list.filter(item => item.type !== "onstreet");
}

if (currentSearchMode === "onstreet") {
  modeFilteredList = list.filter(item => item.type === "onstreet");
}

const displayList = hideFullParking
  ? modeFilteredList.filter(item => Number(item.car_value) > 0)
  : modeFilteredList;
    

if (!Array.isArray(displayList) || displayList.length === 0) {
  statusText.textContent = `「${keyword}」附近 ${radiusKm} 公里內查無 TDX 停車資料`;

  if (radiusKm < 3) {
    parkingList.innerHTML = `
      <div class="bg-white rounded-xl p-5 shadow-sm text-center border border-gray-200">
        <div class="text-gray-600 mb-3">
          1.5 公里內查無停車場資料。
        </div>
        <button onclick="expandSearchTo3Km()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium shadow-sm">
          擴大搜尋至 3 公里
        </button>
      </div>
    `;
  } else {
    parkingList.innerHTML = `
      <div class="text-center text-gray-500 py-8">
        3 公里內仍查無附近停車場資料，請換一個地點搜尋。
      </div>
    `;
  }

  return;
}

const modeText =
  currentSearchMode === "onstreet"
    ? "路邊停車位"
    : currentSearchMode === "mixed"
      ? "停車場與路邊車格"
      : "停車場";

statusText.textContent =
  hideFullParking
    ? `已找到「${keyword}」附近 ${radiusKm} 公里內 ${modeText} ${modeFilteredList.length} 筆，隱藏 0 車位後顯示 ${displayList.length} 筆`
    : `已找到「${keyword}」附近 ${radiusKm} 公里內 ${modeText} ${displayList.length} 筆`;
const expandButtonHtml = radiusKm < 3
  ? `
    <div class="bg-white rounded-xl p-3 shadow-sm text-center border border-gray-200 mb-3">
      <button onclick="expandSearchTo3Km()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium shadow-sm">
        顯示 3 公里內更多停車場
      </button>
    </div>
  `
  : "";
parkingList.innerHTML = expandButtonHtml + displayList.map(item => {
    const name = item.name || "未命名停車場";
    const address = item.address || "未提供地址";
    const total = item.car_total ?? "未提供";
    const value = item.car_value ?? "未提供";
    const time = item.update_time || "未提供";
    const pay = item.pay_info || "未提供收費資訊";
    const distance = item.distanceKm ?? "?";
const source = item.source || "TDX";
const type = item.type || "offstreet";

const isOnStreet = type === "onstreet";
const valueTitle = isOnStreet ? "路邊車格狀態" : "汽車剩餘車位";
const totalTitle = isOnStreet ? (item.road_status_text || "狀態未知") : `總汽車格 ${total}`;

const typeBadge =
  isOnStreet
    ? `<span class="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-full">🛣️ 路邊車格</span>`
    : `<span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full">🅿️ 停車場</span>`;
    const itemLat = item.lat;
    const itemLon = item.lon;

    const mapUrl =
      itemLat && itemLon
        ? `https://www.google.com/maps?q=${itemLat},${itemLon}`
        : `https://www.google.com/maps/search/${encodeURIComponent(name)}`;

    const numericValue = Number(value);

    const valueClass =
      Number.isNaN(numericValue)
        ? "text-gray-500"
        : numericValue > 30
          ? "text-green-600"
          : numericValue > 0
            ? "text-yellow-600"
            : "text-red-600";

    const statusBadge =
      Number.isNaN(numericValue)
        ? `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-full">未提供即時車位</span>`
        : numericValue > 30
          ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">車位充足</span>`
          : numericValue > 0
            ? `<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full">車位偏少</span>`
            : `<span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full">可能已滿</span>`;

    return `
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
        <div class="flex justify-between items-start gap-3">
          <div class="flex-1">
            <div class="flex items-center gap-2 flex-wrap">
<h2 class="text-lg font-bold text-gray-800">${name}</h2>
${typeBadge}
${statusBadge}
            </div>
            <p class="text-sm text-gray-500 mt-1">${address}</p>
          </div>

<div class="text-right min-w-[95px]">
  <div class="text-xs text-gray-500">${valueTitle}</div>
  <div class="text-2xl font-bold ${valueClass}">${value}</div>
  <div class="text-xs text-gray-400">${totalTitle}</div>
</div>
        </div>

        <div class="mt-3 text-sm text-gray-600 leading-relaxed">
          <div><i class="fa-solid fa-route mr-1"></i> 距離：約 ${distance} 公里</div>
          <div><i class="fa-solid fa-coins mr-1"></i> 收費：${pay}</div>
          <div><i class="fa-regular fa-clock mr-1"></i> 更新時間：${time}</div>
          <div class="text-xs text-gray-400 mt-1">資料來源：${source}，實際車位與費率請以現場公告為準</div>
        </div>

        <a href="${mapUrl}" target="_blank"
           class="block mt-4 text-center bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium">
          <i class="fa-solid fa-location-dot mr-1"></i>
          開啟 Google 地圖導航
        </a>
      </div>
    `;
  }).join("");
}
async function expandSearchTo3Km() {
  const keyword = lastSearchKeyword || document.getElementById("search-input").value.trim();
  const statusText = document.getElementById("status-text");
  const parkingList = document.getElementById("parking-list");
  const spinner = document.getElementById("loading-spinner");

  if (!keyword) {
    statusText.textContent = "請先輸入地點再擴大搜尋";
    return;
  }

  currentRadiusKm = 3;

  spinner.classList.remove("hidden");
  statusText.textContent = `正在擴大搜尋「${keyword}」附近 3 公里內停車位...`;
  parkingList.innerHTML = `<div class="text-center text-gray-500 py-8">擴大搜尋中，請稍候...</div>`;

  try {
    const coord = await getCoordinate(keyword);

    if (!coord) {
      statusText.textContent = `找不到「${keyword}」的座標，請換一個較明確的地名。`;
      parkingList.innerHTML = `<div class="text-center text-red-500 py-8">找不到地點座標</div>`;
      return;
    }

    await searchParkingByCoordinate(coord.lat, coord.lon, keyword);

  } catch (err) {
    statusText.textContent = "擴大搜尋失敗";
    parkingList.innerHTML = `
      <div class="bg-white rounded-xl p-4 shadow-sm text-red-600">
        擴大搜尋失敗：${err.message}
      </div>
    `;
  } finally {
    spinner.classList.add("hidden");
  }
}
let recognition = null;
let isRecording = false;
function parseVoiceCommand(text) {
  let keyword = text.trim();
  let mode = "offstreet";

  // 說「停車位、路邊、車格」時，視為查路邊車格
  if (
    keyword.includes("路邊") ||
    keyword.includes("停車位") ||
    keyword.includes("車格")
  ) {
    mode = "onstreet";
  }

  // 說「停車場」時，視為查路外停車場
  if (keyword.includes("停車場")) {
    mode = "offstreet";
  }

  // 移除常見指令字，留下地點
  keyword = keyword
    .replaceAll("查詢", "")
    .replaceAll("搜尋", "")
    .replaceAll("找", "")
    .replaceAll("附近的", "")
    .replaceAll("附近", "")
    .replaceAll("停車場", "")
    .replaceAll("停車位", "")
    .replaceAll("路邊停車位", "")
    .replaceAll("路邊車格", "")
    .replaceAll("車格", "")
    .trim();

  // 如果使用者只說「查詢附近的停車場」，沒有說地點，就用目前定位
  if (!keyword) {
    keyword = "目前位置";
  }

  return {
    keyword,
    mode
  };
}
    function getCurrentLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error("你的瀏覽器不支援定位功能"));
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position => {
        resolve({
          lat: position.coords.latitude,
          lon: position.coords.longitude
        });
      },
      error => {
        reject(new Error("無法取得目前位置，請確認是否允許定位權限"));
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 60000
      }
    );
  });
}
function toggleVoiceSearch() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  const micBtn = document.getElementById("mic-btn");
  const micTip = document.getElementById("mic-tip");
  const micIcon = document.getElementById("mic-icon");
  const statusText = document.getElementById("status-text");

  if (!SpeechRecognition) {
    alert("你的瀏覽器不支援語音輸入。建議使用 Chrome 或 Edge。");
    return;
  }

  if (isRecording && recognition) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "zh-TW";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add("recording-active");
    micIcon.className = "fa-solid fa-stop text-2xl";
    micTip.textContent = "聆聽中，請說出想查詢的地點...";
    statusText.textContent = "正在聆聽語音指令...";
  };

 recognition.onresult = (event) => {
  const transcript = event.results[0][0].transcript.trim();

  console.log("語音辨識結果：", transcript);

  const parsed = parseVoiceCommand(transcript);

  currentSearchMode = parsed.mode;
  currentRadiusKm = 1.5;
  lastSearchKeyword = parsed.keyword;

  const input = document.getElementById("search-input");
  input.value = parsed.keyword;

  const modeText =
    currentSearchMode === "onstreet"
      ? "路邊停車位"
      : "停車場";

  statusText.textContent = `語音辨識：${transcript}，正在搜尋附近${modeText}...`;

  // 稍微延遲，讓畫面先更新，再執行搜尋
  setTimeout(() => {
    doVoiceSearch(parsed.keyword);
  }, 150);
};

  recognition.onerror = (event) => {
  console.error("語音辨識錯誤：", event.error);

  if (event.error === "not-allowed") {
    statusText.textContent = "麥克風權限被拒絕，請到網址列左側鎖頭允許麥克風，然後重新整理網頁。";
    alert("麥克風權限被拒絕，請允許此網站使用麥克風。");
    return;
  }

  statusText.textContent = "語音辨識失敗，請再試一次或改用文字輸入。";
};

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove("recording-active");
    micIcon.className = "fa-solid fa-microphone text-2xl";
    micTip.textContent = "按我開始語音搜尋";
  };

  recognition.start();
}
    window.doAdvancedSearch = doAdvancedSearch;
window.expandSearchTo3Km = expandSearchTo3Km;
window.toggleVoiceSearch = toggleVoiceSearch;
</script>
