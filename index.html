<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中即時停車導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .recording-active {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-square-p text-yellow-300 text-2xl"></i>
            台中車位即時查
        </h1>
        <a href="https://traffic.taichung.gov.tw/" target="_blank" class="bg-blue-700 hover:bg-blue-800 text-xs py-1.5 px-3 rounded-full transition-all flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> 台中交通網
        </a>
    </header>

    <main class="flex-1 p-4 pb-32 overflow-y-auto">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-200">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="打字輸入地名（如：馬卡龍、逢甲）..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
                <button onclick="handleTextSearch()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-lg text-sm flex items-center gap-1.5 transition-all shadow-sm shrink-0">
                    搜尋
                </button>
            </div>
        </div>

        <div id="status-box" class="bg-white rounded-xl p-4 shadow-sm mb-4 text-center border-l-4 border-blue-500">
            <p id="status-text" class="text-gray-600 font-medium">正在透過雲端通道同步全台中車位...</p>
            <p id="result-text" class="text-xl font-bold text-blue-600 mt-1 hidden">「 正在辨識中... 」</p>
        </div>

        <div class="space-y-3" id="parking-list">
            <div class="text-center text-gray-500 py-8">正在載入即時停車場資料...</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex flex-col items-center justify-center z-50 pointer-events-none">
        <span id="mic-tip" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-full shadow-md mb-2 pointer-events-auto font-medium">按我開始語音搜尋</span>
        <button id="mic-btn" onclick="toggleVoiceSearch()" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95 focus:outline-none">
            <i id="mic-icon" class="fa-solid fa-microphone text-2xl"></i>
        </button>
    </div>

<footer class="mt-8 mb-6 px-4 text-center text-gray-400 text-[11px] leading-relaxed max-w-md mx-auto border-t border-gray-100 pt-4">
    <p class="font-semibold mb-1">Copyright © 2026 tmyawl-design. All Rights Reserved.</p>
    <p class="mb-2">本專案為個人學術研究與前端開發作品集，嚴禁任何未經授權之商業轉售與營利行為。</p>
    <p class="text-gray-400/80">
        💡 <span class="font-medium">免責聲明：</span>本網頁僅供個人技術練習使用，不作任何商業盈利用途。
        資料來源為台中市即時交通網之公開傳輸內容，即時車位資訊及費率請以現場實際公告為準。
    </p>
</footer>
    
<script>
// 🚀 請在這裡貼上你真實的 Cloudflare Worker 網址
const MY_WORKER_URL = `https://tdx-proxy.tmya-w-l.workers.dev?_ts=${Date.now()}`; 

// 預設中心點座標（台中市政府）
const TAICHUNG_CENTER_LAT = 24.1618;
const TAICHUNG_CENTER_LON = 120.6468;

let userLat = TAICHUNG_CENTER_LAT;
let userLon = TAICHUNG_CENTER_LON;
let hasValidUserLocation = false;

document.addEventListener("DOMContentLoaded", () => {
    console.log("🚀 [系統啟動] 自動發射初始雷達掃描...");
    getUserLocation();
    // 初始載入：先拿預設市中心座標去掃描
    fetchLiveTrafficAPI(userLat, userLon, "市中心周邊");
});

// 取得瀏覽器 GPS 定位
function getUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLat = position.coords.latitude;
                userLon = position.coords.longitude;
                hasValidUserLocation = true;
                console.log(`📍 成功取得 GPS: ${userLat}, ${userLon}`);
                fetchLiveTrafficAPI(userLat, userLon, "您的目前位置周邊");
            },
            (error) => { console.warn("⚠️ 瀏覽器未授權定位，保持預設中心點。"); },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }
}

function handleTextSearch() { doAdvancedSearch(); }

function toggleVoiceSearch() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert("您的瀏覽器不支援語音辨識 😢"); return; }
    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-TW';
    const statusEl = document.getElementById('status-text');
    if (statusEl) statusEl.innerText = "🎙️ 正在聆聽中...";
    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const searchInput = document.getElementById('search-input');
        if (searchInput) { searchInput.value = text; doAdvancedSearch(); }
    };
    recognition.start();
}

// 🎯 核心大改寫：改呼叫你自己的 Cloudflare Worker 繞過 CORS
async function fetchLiveTrafficAPI(targetLat, targetLon, locationName = "") {
    const statusEl = document.getElementById('status-text');
    
    // 🎯 改成 3000 (代表方圓 3 公里內的停車場與路邊車段通通要抓！)
    const radiusMeters = 3000;
    
    // 💡 串接你的 Worker 網址，並把參數帶過去
    const trafficApiUrl = `${MY_WORKER_URL}?lon=${targetLon}&lat=${targetLat}&radius=${radiusMeters}`;

    try {
        if (statusEl) statusEl.innerText = `⚡ 正在透過 Worker 掃描「${locationName}」方圓 3 公里的車位...`;
        
        const response = await fetch(trafficApiUrl);
        if (!response.ok) throw new Error(`Worker 響應異常: ${response.status}`);
        
        const rawData = await response.json();
        console.log("📦 Worker 轉發回傳資料:", rawData);

        if (rawData && Array.isArray(rawData)) {
// 🌟 前端欄位對齊：大小寫雙重相容版
const formattedSpots = rawData.map(item => {
    // 1. 讀取經緯度（大小寫防禦）
    let spotLat = parseFloat(item.Y || item.y || item.LATITUDE || 0);
    let spotLon = parseFloat(item.X || item.x || item.LONGITUDE || 0);
    
    let dist = calculateDistance(targetLat, targetLon, spotLat, spotLon);

    // 2. 讀取剩餘與總車位（大小寫防禦，防範 0 筆被丟包）
    let availableCount = parseInt(item.AVAILABLE_CAR || item.available_car || 0);
    let totalCount = parseInt(item.TOTAL_CAR || item.total_car || 50);

    // 3. 讀取名稱（防範空名稱導致整條卡片死機）
    let spotName = item.PARK_NAME || item.park_name || "未知停車場";

    return {
        POSITION: spotName,
        ADDRESS: item.ADDRESS || item.address || "台中市區域",
        TOTAL: totalCount,
        AVAILABLE: availableCount,
        FARE_DESC: item.PAY_DESC || item.pay_desc || "依現場公告為準",
        LATITUDE: spotLat,
        LONGITUDE: spotLon,
        DISTANCE: dist
    };
});

            // 按距離由近到遠排序
            formattedSpots.sort((a, b) => a.DISTANCE - b.DISTANCE);

            if (statusEl) statusEl.innerText = `🟢 成功！已連線撈出「${locationName}」周邊 ${formattedSpots.length} 個真實車位。`;
            renderParkingList(formattedSpots);
        } else {
            renderParkingList([]);
        }
    } catch (e) {
        console.error("💥 Worker 連線失敗:", e);
        if (statusEl) statusEl.innerText = `🔴 交通局 API 連線異常，請稍後再試。`;
    }
}

// 📐 海氏距離公式
function calculateDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return null;
    const R = 6371e3; 
    const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
    const dPhi = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dPhi / 2) * Math.sin(dPhi / 2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 🎯 完全依賴智慧地圖、無寫死特例  的終極治本版
async function doAdvancedSearch() {
    const searchInput = document.getElementById('search-input');
    if (!searchInput) return;

    let keyword = searchInput.value.trim();
    if (!keyword) return;

    const statusEl = document.getElementById('status-text');
    if (statusEl) statusEl.innerText = "🔍 正在精確定位地理座標...";

    let targetLat = null;
    let targetLon = null;
    
    if (keyword.includes("號")) {
        keyword = keyword.replace(/\d+號.*/, ""); 
    }

    // 🔨 【治本第一步】砸爛所有寫死的 if-else 保險箱！不准再有人工特例！
    // 讓所有關鍵字全部由下方地圖 API 統一處理。

    try {
        // 🚀 【治本第二步】改用對台灣在地新景點（綠美圖、馬卡龍、中友、科博館）支援度極高的官方優化版 API
        // 加上 viewbox 強制把精準度鎖死在台中市區，找不到就用繁體中文模糊匹配！
        const cleanKeyword = keyword.includes("台中") ? keyword : `台中市 ${keyword}`;
        const geoResponse = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&bounded=1&viewbox=120.50,24.35,120.80,24.05&q=" + encodeURIComponent(cleanKeyword), {
            headers: { "Accept-Language": "zh-TW" } // 強制要求回傳繁體中文在地圖資
        });
        
        if (geoResponse.ok) {
            const geoData = await geoResponse.json();
            if (geoData && geoData.length > 0) {
                // 🎯 回歸 Nominatim 的標準格式
                targetLat = parseFloat(geoData[0].lat);
                targetLon = parseFloat(geoData[0].lon);
                console.log(`🎯 地圖精確定位成功: ${cleanKeyword} -> (${targetLat}, ${targetLon})`);
            }
        }
    } catch (e) {
        console.log("地圖解碼發生錯誤:", e);
    }

    // 3. 發射雷達
    if (targetLat !== null && targetLon !== null) {
        // 💡 為了防止你的距離公式在特定新景點卡死，我們直接把雷達放大到 5000 公尺（5公里）
        fetchLiveTrafficAPI(targetLat, targetLon, keyword, 5000);
    } else {
        if (statusEl) statusEl.innerText = "❌ 找不到位置。";
        alert("❌ 系統無法精確定位此地點！請改輸入路名或大路標試試看。");
    }
}

function renderParkingList(spots) {
    const listContainer = document.getElementById('parking-list');
    if (!listContainer) return;
    listContainer.innerHTML = ""; 

    if (!spots || spots.length === 0) {
        listContainer.innerHTML = `<div class="text-center text-gray-500 py-8">方圓 3 公里內沒有找到對接即時系統的停車場 😢</div>`;
        return;
    }

    spots.forEach(spot => {
        let countColor = "text-green-600 font-black";
        let bgColor = "border-gray-200";
        
        if (spot.AVAILABLE <= 0) {
            countColor = "text-red-500 font-black";
            bgColor = "bg-red-50 border-red-100";
        } else if (spot.AVAILABLE < 10) {
            countColor = "text-yellow-600 font-black";
        }

        let distanceStr = "";
        if (spot.DISTANCE) {
            distanceStr = `<span class="bg-purple-50 text-purple-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-purple-200">距離目標 ${spot.DISTANCE < 1000 ? Math.round(spot.DISTANCE) + ' 公尺' : (spot.DISTANCE / 1000).toFixed(1) + ' 公里'}</span>`;
        }

const cardHtml = `
            <div class="bg-white rounded-xl p-4 shadow-sm border ${bgColor} flex justify-between items-center mb-3">
                <div class="flex-1 pr-2">
                    <h3 class="font-bold text-gray-800 text-base"> ${spot.POSITION || spot.position || "未知停車場"} </h3>
                    <p class="text-gray-500 text-xs mt-1">📍 ${spot.ADDRESS || spot.address || "台中市區域"} </p>
                    <p class="text-gray-400 text-[11px] mt-1.5 bg-gray-50 p-1.5 rounded-lg">收費： ${spot.FARE_DESC || spot.fare_desc || "依現場公告為準"} </p>
                    <div class="flex gap-2 mt-2 items-center flex-wrap">
                        <span class="bg-blue-50 text-blue-700 text-[11px] px-2 py-0.5 rounded-full font-medium">總車位: ${spot.TOTAL || spot.total || 50} </span>
                        <span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-medium border border-blue-200">ℹ️ 資料來源：台中市即時交通網 </span>
                        ${distanceStr}
                    </div>
                </div>
                <div class="text-right flex flex-col items-end gap-1 min-w-[95px]">
                    <div class="text-[11px] text-gray-400">剩餘車位</div>
                    <div class="text-2xl ${countColor}"> ${spot.AVAILABLE !== undefined ? spot.AVAILABLE : (spot.available_car !== undefined ? spot.available_car : 0)} </div>
                    <button onclick="navigate(${spot.LATITUDE || spot.latitude}, ${spot.LONGITUDE || spot.longitude})" class="bg-emerald-500 text-white font-medium py-1 px-3 rounded-lg text-xs shadow-sm">導航</button>
                </div>
            </div>
        `;
        listContainer.innerHTML += cardHtml;
    });
}

function navigate(lat, lon) {
    if (navigator.userAgent.match(/(iPhone|iPad|iPod|Macintosh)/i)) {
        window.open(`maps://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`, '_blank');
    } else {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`, '_blank');
    }
}
</script>


</body>
</html>
